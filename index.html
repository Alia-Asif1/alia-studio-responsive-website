<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', Times, serif;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            color: rgb(135, 3, 135);
            background: rgb(12, 125, 238);
            text-align: center;
        }

        .nav-links a {
            justify-content: center;
            display: block;
            margin: 10px 0 ;
            color: rgb(135, 3, 135);
            
            padding: 15px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .hero {
            justify-content: space-between;
            padding: 30px ;
            text-align: center;
            background: rgb(9, 203, 96);
        }
        h1 {
            font-weight: bold;
            font-size: 28px;
            justify-content: center;
        }
        button {
            width: 120px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            color: white;
            background-color: blueviolet
        }
        .Container {
            text-align:center;
            justify-content: center;
            display: flex;
            max-width: 1000px;
            gap: 29px;
            margin: 40px auto;

        }
        .card {
            width: 250px;
            padding: 20px;
            box-shadow: 0 0 10px gray;
            border-radius: 10px;
        }
        .card:hover{
            transform: translateY(-10px);
            transition:0.3s ;
        }
        .footer{
            padding: 10px;
            color: aliceblue;
            background: black;
            text-align: center;
        }
        @media(max-width:768px){
            .navbar{
                flex-direction: column;
                padding: 20px;
            }
            .nav-links {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            h1{
                font-weight: bold;
                font-size: 28px;
            }
            button{
                width: 100%;
            }
            .Container{
                flex-direction: column;
                align-items: center;
            
            }
            .card{
                width: 80%;
            }

            }
        
    </style>
</head>

<body>
    <div class="navbar">
        <h1>Alia Asif Studio</h1>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Contact</a>
            <a href="#">about</a>
        </div>
    </div>
    <div class="hero">
        <h2>Well to Alia Asif Studio</h2>
        <p>We creat amazing Website</p>
        <div>
            <button>Get started</button>
        </div>
    </div>
    <div class="Container">
        <div class="card">
            <h2>Web Desgin</h2>
            <p>We desgin your Website</p>
        </div>
        <div class="card">
            <h2>Video Edit</h2>
            <p>We Edit your Video</p>
        </div>
        <div class="card">
            <h2>Social Media</h2>
            <p>We mange your social Media</p>
        </div>
        </div>
       <div class="footer">
        <p>@Alia Asif Studio 2026</p>
       </div>
</body>

</html>
